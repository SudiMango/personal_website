services:
    db:
        image: postgres:15-alpine
        restart: always
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: password
            POSTGRES_DB: portfolio
        ports:
            - "5433:5432"

    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile
        restart: always
        environment:
            DATABASE_URL: postgresql://postgres:password@db:5432/portfolio?sslmode=disable
        depends_on:
            - db

    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
        restart: always
        depends_on:
            - backend
        ports:
            - "3000:3000"
